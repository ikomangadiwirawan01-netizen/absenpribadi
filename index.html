<!DOCTYPE html>
<html>
<head>
  <title>Absen Pribadi</title>

<style>
  body{
    font-family: Arial;
    text-align:center;
    margin-top:100px;
  }

  button{
    width:220px;
    height:60px;
    font-size:20px;
    margin:10px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    color:white;
  }

  .masuk{
    background:green;
  }

  .setengah{
    background:orange;
  }

  .tidak{
    background:red;
  }
</style>
</head>

<body>

  <h1>Absen Kerja</h1>

  <button class="masuk" onclick="absen('Masuk')">
  MASUK
</button>

<button class="setengah" onclick="absen('Setengah Hari')">
  SETENGAH HARI
</button>

<button class="tidak" onclick="absen('Tidak Masuk')">
  TIDAK MASUK
</button>

  <h3 id="hasil"></h3>

  <script>
   const scriptURL = "https://script.google.com/macros/s/AKfycbxbIIKV0eXLUflgheBaM94SeWgmrbpe7UNG7b3c6DPqbuFZg7GrBm8-8u1UvUC039Rw/exec";
const namaSaya = "MANGADI";

function absen(status) {
  fetch(scriptURL, {
    method: "POST",
    mode: "no-cors",
    headers: {
      "Content-Type": "text/plain"
    },
    body: JSON.stringify({
      nama: namaSaya,
      status: status
    })
  })
  .then(() => {
    document.getElementById("hasil").innerHTML =
      "Absen berhasil : " + status;
  })
  .catch(() => {
    document.getElementById("hasil").innerHTML =
      "Gagal mengirim data";
  });
}
  </script>

</body>
</html>
