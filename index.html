<!DOCTYPE html>
<html lang="id">

<head>
  <!-- =======================================================
       BAGIAN 1: PENGATURAN DASAR HALAMAN
  ======================================================== -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Absen Pribadi</title>

  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#008000">

  <!-- =======================================================
       BAGIAN 2: STYLE / TAMPILAN CSS
  ======================================================== -->
  <style>
    /* =======================================================
       2.1 STYLE DASAR
    ======================================================== */
    *{
      box-sizing:border-box;
    }

    body{
      font-family: Arial, sans-serif;
      text-align:center;
      margin:0;
      padding:0;
      background:#f7faf8;
      color:#1f2937;
    }

    body.offline-padding{
      padding-top:48px;
    }

    button{
      border:none;
      cursor:pointer;
      font-family:inherit;
    }

    /* =======================================================
       2.2 BAR OFFLINE
    ======================================================== */
    .offline-bar{
      display:none;
      position:fixed;
      top:0;
      left:0;
      right:0;
      background:#dc2626;
      color:white;
      padding:12px;
      font-size:15px;
      font-weight:bold;
      z-index:10000;
      text-align:center;
    }

    /* =======================================================
       2.3 HERO HEADER HIJAU
    ======================================================== */
    .hero{
      position:relative;
      background:linear-gradient(135deg,#006b2f,#07963f,#0fb14d);
      color:white;
      padding:28px 18px 95px 18px;
      border-bottom-left-radius:42px;
      border-bottom-right-radius:42px;
      overflow:hidden;
    }

    .hero::before{
      content:"";
      position:absolute;
      width:260px;
      height:260px;
      border-radius:50%;
      background:rgba(255,255,255,0.08);
      top:-80px;
      left:-80px;
    }

    .hero::after{
      content:"";
      position:absolute;
      width:230px;
      height:230px;
      border-radius:50%;
      background:rgba(255,255,255,0.08);
      right:-80px;
      bottom:-70px;
    }

    .hero-top{
      display:none;
    }

    .hero-title{
      position:relative;
      z-index:2;
      margin:18px auto 0 auto;
    }

    .hero-title h1{
      margin:0;
      font-size:54px;
      font-weight:800;
      letter-spacing:-1px;
      text-shadow:0 3px 10px rgba(0,0,0,0.18);
    }

    .hero-title p{
      margin:10px 0 0 0;
      font-size:21px;
      opacity:0.95;
    }

    /* =======================================================
       2.4 KONTAINER UTAMA
    ======================================================== */
    .app-container{
      max-width:980px;
      margin:-65px auto 30px auto;
      padding:0 18px 30px 18px;
      position:relative;
      z-index:3;
    }

    /* =======================================================
       2.5 KARTU TANGGAL HARI INI
    ======================================================== */
    .today-card{
      background:white;
      border-radius:28px;
      padding:24px;
      box-shadow:0 15px 35px rgba(0,0,0,0.12);
      display:flex;
      align-items:center;
      gap:18px;
      text-align:left;
      margin-bottom:28px;
    }

    .today-icon{
      width:58px;
      height:58px;
      border-radius:16px;
      background:#e8f7ef;
      color:#0a8f3c;
      font-size:32px;
      display:flex;
      align-items:center;
      justify-content:center;
      flex-shrink:0;
    }

    #tanggal{
      font-size:25px;
      font-weight:800;
      color:#2d2d2d;
      margin-bottom:5px;
    }

    .today-subtitle{
      font-size:18px;
      color:#6b7280;
    }

    /* =======================================================
       2.6 TOMBOL ABSEN MODEL KARTU
    ======================================================== */
    .button-area{
      display:grid;
      grid-template-columns:repeat(3, 1fr);
      gap:24px;
      margin-bottom:28px;
    }

    .absen-card{
      min-height:190px;
      border-radius:24px;
      color:white;
      padding:25px;
      box-shadow:0 18px 32px rgba(0,0,0,0.16);
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      transition:transform 0.15s ease, box-shadow 0.15s ease;
    }

    .absen-card:hover{
      transform:translateY(-3px);
      box-shadow:0 22px 38px rgba(0,0,0,0.2);
    }

    .absen-icon{
      width:70px;
      height:70px;
      border-radius:50%;
      background:white;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:38px;
      font-weight:bold;
      margin-bottom:16px;
    }

    .absen-title{
      font-size:25px;
      font-weight:800;
      margin-bottom:8px;
    }

    .absen-desc{
      font-size:17px;
      opacity:0.95;
    }

    .masuk{
      background:linear-gradient(135deg,#19b34a,#008b2f);
    }

    .masuk .absen-icon{
      color:#07963f;
    }

    .setengah{
      background:linear-gradient(135deg,#ffb31a,#fb8c00);
    }

    .setengah .absen-icon{
      color:#fb8c00;
    }

    .tidak{
      background:linear-gradient(135deg,#ff4141,#ef1717);
    }

    .tidak .absen-icon{
      color:#ef1717;
    }

    /* =======================================================
       2.7 STATUS DATA KALENDER
    ======================================================== */
    .status-card{
      background:#eaffef;
      border:1px solid #b7efc4;
      border-radius:20px;
      padding:18px 22px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:15px;
      margin-bottom:28px;
      text-align:left;
    }

    .status-left{
      display:flex;
      align-items:center;
      gap:15px;
    }

    .status-icon{
      width:50px;
      height:50px;
      border-radius:50%;
      background:#0a9b3e;
      color:white;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:28px;
      font-weight:bold;
      flex-shrink:0;
    }

    #hasil{
      margin:0;
      color:#0b7f31;
      font-size:22px;
      font-weight:800;
    }

    #lastUpdate{
      margin-top:5px;
      color:#6b7280;
      font-size:16px;
    }

    .refresh-btn{
      width:58px;
      height:58px;
      border-radius:18px;
      background:#eaffef;
      border:1px solid #b7efc4;
      color:#0a8f3c;
      font-size:30px;
      display:flex;
      align-items:center;
      justify-content:center;
      flex-shrink:0;
    }

    /* =======================================================
       2.8 KALENDER
    ======================================================== */
    .calendar-box{
      background:white;
      border-radius:28px;
      padding:26px;
      box-shadow:0 15px 35px rgba(0,0,0,0.10);
      border:1px solid #e5e7eb;
    }

    .calendar-header{
      display:flex;
      align-items:center;
      justify-content:space-between;
      margin-bottom:24px;
      gap:15px;
    }

    .calendar-title{
      font-size:36px;
      font-weight:800;
      flex:1;
      text-align:center;
    }

    .nav-bulan{
      width:58px;
      height:58px;
      border-radius:50%;
      background:#fee2e2;
      color:#dc2626;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:34px;
      font-weight:bold;
    }

    .nav-bulan:hover{
      background:#fecaca;
    }

    .calendar{
      display:grid;
      grid-template-columns:repeat(7, 1fr);
      gap:10px;
    }

    .day-name{
      font-weight:800;
      padding:13px 0;
      background:#f3f4f6;
      border-radius:12px;
      font-size:17px;
    }

    .day-name.minggu-title{
      background:#fee2e2;
      color:#dc2626;
    }

    .day{
      min-height:78px;
      border:1px solid #dedede;
      border-radius:14px;
      display:flex;
      flex-direction:column;
      justify-content:center;
      align-items:center;
      font-size:23px;
      background:#fff;
      cursor:pointer;
      transition:0.15s ease;
    }

    .day:hover{
      background:#f0fff4;
    }

    .today{
      border:4px solid #008000;
      font-weight:800;
    }

    .selected{
      background:#dbeafe !important;
      border:4px solid #2563eb !important;
      font-weight:800;
    }

    .minggu{
      background:#fee2e2 !important;
      color:#dc2626;
      border:1px solid #fca5a5;
      font-weight:800;
    }

    .minggu.selected{
      background:#dbeafe !important;
      color:#111827;
      border:4px solid #2563eb !important;
    }

    .minggu.today{
      border:4px solid #dc2626;
    }

    .dot{
      width:16px;
      height:16px;
      border-radius:50%;
      margin-top:8px;
    }

    /* =======================================================
       2.9 LEGENDA
    ======================================================== */
    .legend{
      margin-top:22px;
      padding:14px;
      border:1px solid #e5e7eb;
      border-radius:14px;
      display:flex;
      justify-content:center;
      gap:28px;
      flex-wrap:wrap;
      font-size:15px;
      color:#5f6368;
    }

    .legend span{
      display:inline-flex;
      align-items:center;
      gap:8px;
    }

    .mini-dot{
      width:14px;
      height:14px;
      border-radius:50%;
      display:inline-block;
    }

    /* =======================================================
       2.10 TOMBOL INSTALL
    ======================================================== */
    #installBtn{
      display:none;
      background:#333;
      color:white;
      width:220px;
      height:50px;
      border-radius:10px;
      margin-top:24px;
      font-size:16px;
    }

    /* =======================================================
       2.11 MODAL KONFIRMASI TANGGAL
    ======================================================== */
    .modal-overlay{
      display:none;
      position:fixed;
      inset:0;
      background:rgba(0,0,0,0.45);
      z-index:9999;
      justify-content:center;
      align-items:center;
      padding:20px;
    }

    .modal-box{
      background:white;
      width:100%;
      max-width:390px;
      border-radius:22px;
      padding:26px;
      text-align:center;
      box-shadow:0 15px 40px rgba(0,0,0,0.25);
      animation:modalMasuk 0.2s ease;
    }

    .modal-icon{
      width:58px;
      height:58px;
      background:#fff3cd;
      color:#b45309;
      border-radius:50%;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:32px;
      margin:0 auto 15px auto;
      font-weight:bold;
    }

    .modal-box h2{
      margin:0 0 10px 0;
      font-size:23px;
    }

    .modal-box p{
      margin:0 0 20px 0;
      color:#555;
      line-height:1.5;
    }

    .modal-actions{
      display:flex;
      gap:10px;
      justify-content:center;
    }

    .modal-actions button{
      width:140px;
      height:46px;
      color:white;
      font-size:16px;
      border-radius:10px;
    }

    .btn-batal{
      background:#6b7280;
    }

    .btn-lanjut{
      background:#2563eb;
    }

    @keyframes modalMasuk{
      from{
        transform:scale(0.9);
        opacity:0;
      }
      to{
        transform:scale(1);
        opacity:1;
      }
    }

    /* =======================================================
       2.12 RESPONSIVE COMPACT UNTUK HP
    ======================================================== */
    @media(max-width:700px){
      .hero{
        padding:18px 14px 70px 14px;
        border-bottom-left-radius:28px;
        border-bottom-right-radius:28px;
      }

      .hero-title{
        margin-top:10px;
      }

      .hero-title h1{
        font-size:34px;
      }

      .hero-title p{
        font-size:14px;
      }

      .app-container{
        margin:-48px auto 18px auto;
        padding:0 10px 20px 10px;
      }

      .today-card{
        padding:14px;
        border-radius:20px;
        margin-bottom:16px;
      }

      .today-icon{
        width:44px;
        height:44px;
        font-size:24px;
        border-radius:12px;
      }

      #tanggal{
        font-size:17px;
      }

      .today-subtitle{
        font-size:13px;
      }

      .button-area{
        grid-template-columns:1fr;
        gap:10px;
        margin-bottom:16px;
      }

      .absen-card{
        min-height:76px;
        border-radius:16px;
        flex-direction:row;
        justify-content:center;
        gap:14px;
        padding:14px;
      }

      .absen-icon{
        width:42px;
        height:42px;
        font-size:24px;
        margin-bottom:0;
      }

      .absen-title{
        font-size:20px;
        margin-bottom:0;
      }

      .absen-desc{
        font-size:13px;
      }

      .status-card{
        padding:12px;
        border-radius:16px;
        margin-bottom:16px;
      }

      .status-icon{
        width:40px;
        height:40px;
        font-size:22px;
      }

      #hasil{
        font-size:17px;
      }

      #lastUpdate{
        font-size:12px;
      }

      .refresh-btn{
        width:42px;
        height:42px;
        font-size:22px;
        border-radius:14px;
      }

      .calendar-box{
        padding:12px;
        border-radius:20px;
      }

      .calendar-header{
        margin-bottom:14px;
      }

      .calendar-title{
        font-size:24px;
      }

      .nav-bulan{
        width:38px;
        height:38px;
        font-size:26px;
      }

      .calendar{
        gap:5px;
      }

      .day-name{
        font-size:12px;
        padding:8px 0;
        border-radius:9px;
      }

      .day{
        min-height:52px;
        font-size:17px;
        border-radius:10px;
      }

      .dot{
        width:11px;
        height:11px;
        margin-top:5px;
      }

      .legend{
        gap:10px;
        font-size:11px;
        padding:10px;
      }

      .mini-dot{
        width:11px;
        height:11px;
      }

      .modal-actions{
        flex-direction:column;
      }

      .modal-actions button{
        width:100%;
      }
    }

    @media(max-width:380px){
      .day{
        min-height:46px;
        font-size:16px;
      }

      .calendar{
        gap:4px;
      }

      .day-name{
        font-size:11px;
      }
    }
  </style>
</head>

<body>

  <!-- =======================================================
       BAGIAN 3: BAR NOTIFIKASI OFFLINE
  ======================================================== -->
  <div id="offlineBar" class="offline-bar">
    Anda sedang offline. Data absen membutuhkan internet.
  </div>

  <!-- =======================================================
       BAGIAN 4: HERO HEADER
  ======================================================== -->
  <section class="hero">
    <div class="hero-top"></div>

    <div class="hero-title">
      <h1>Absen Kerja</h1>
      <p>Catat kehadiranmu dengan mudah</p>
    </div>
  </section>

  <!-- =======================================================
       BAGIAN 5: KONTAINER UTAMA
  ======================================================== -->
  <main class="app-container">

    <!-- =======================================================
         BAGIAN 5.1: KARTU TANGGAL HARI INI
    ======================================================== -->
    <section class="today-card">
      <div class="today-icon">📅</div>

      <div>
        <div id="tanggal"></div>
        <div class="today-subtitle" id="quoteHarian">Memuat kata motivasi...</div>
      </div>
    </section>

    <!-- =======================================================
         BAGIAN 5.2: TOMBOL ABSEN
    ======================================================== -->
    <section class="button-area">
      <button class="absen-card masuk" onclick="absen('Masuk')">
        <div class="absen-icon">✓</div>
        <div>
          <div class="absen-title">MASUK</div>
          <div class="absen-desc">Saya hadir</div>
        </div>
      </button>

      <button class="absen-card setengah" onclick="absen('Setengah Hari')">
        <div class="absen-icon">◔</div>
        <div>
          <div class="absen-title">SETENGAH HARI</div>
          <div class="absen-desc">Kerja setengah hari</div>
        </div>
      </button>

      <button class="absen-card tidak" onclick="absen('Tidak Masuk')">
        <div class="absen-icon">×</div>
        <div>
          <div class="absen-title">TIDAK MASUK</div>
          <div class="absen-desc">Saya tidak hadir</div>
        </div>
      </button>
    </section>

    <!-- =======================================================
         BAGIAN 5.3: STATUS DATA KALENDER
    ======================================================== -->
    <section class="status-card">
      <div class="status-left">
        <div class="status-icon">✓</div>
        <div>
          <h3 id="hasil">Memuat data kalender...</h3>
          <div id="lastUpdate">Menghubungkan ke Spreadsheet...</div>
        </div>
      </div>

      <button class="refresh-btn" type="button" onclick="ambilDataSpreadsheet()">↻</button>
    </section>

    <!-- =======================================================
         BAGIAN 5.4: KALENDER ABSEN
    ======================================================== -->
    <section class="calendar-box">

      <div class="calendar-header">
        <button class="nav-bulan" id="prevMonthBtn" type="button" aria-label="Bulan sebelumnya">‹</button>

        <div class="calendar-title" id="calendarTitle"></div>

        <button class="nav-bulan" id="nextMonthBtn" type="button" aria-label="Bulan berikutnya">›</button>
      </div>

      <div class="calendar" id="calendar"></div>

      <div class="legend">
        <span><i class="mini-dot" style="background:green"></i> Masuk</span>
        <span><i class="mini-dot" style="background:orange"></i> Setengah Hari</span>
        <span><i class="mini-dot" style="background:red"></i> Tidak Masuk</span>
        <span><i class="mini-dot" style="background:#fee2e2; border:1px solid #dc2626"></i> Hari Minggu</span>
      </div>

    </section>

    <!-- =======================================================
         BAGIAN 5.5: TOMBOL INSTALL PWA
    ======================================================== -->
    <button id="installBtn">Install Aplikasi</button>

  </main>

  <!-- =======================================================
       BAGIAN 6: MODAL KONFIRMASI TANGGAL
  ======================================================== -->
  <div class="modal-overlay" id="modalTanggal">
    <div class="modal-box">
      <div class="modal-icon">!</div>
      <h2>Konfirmasi Tanggal</h2>
      <p id="modalText">
        Anda memilih tanggal selain hari ini.
      </p>

      <div class="modal-actions">
        <button class="btn-batal" onclick="batalPilihTanggal()">Batal</button>
        <button class="btn-lanjut" onclick="lanjutPilihTanggal()">Lanjutkan</button>
      </div>
    </div>
  </div>

  <!-- =======================================================
       BAGIAN 7: JAVASCRIPT UTAMA
  ======================================================== -->
  <script>

    /* =======================================================
       7.1 KONFIGURASI APLIKASI
    ======================================================== */
    const scriptURL = "https://script.google.com/macros/s/AKfycbwgA5-L3qyLPOl5L_vikrd8AfMDj95UZcFMhdJLWHxxGWdcfMp0qXQtLPYszWdw5XvX/exec";
    const namaSaya = "MANGADI";

    const sekarang = new Date();

    let tahunTampil = sekarang.getFullYear();
    let bulanTampil = sekarang.getMonth();

    let dataAbsen = {};
    let tanggalDipilih = formatKey(sekarang);
    let tanggalPending = "";

    /* =======================================================
       7.2 TAMPILKAN TANGGAL HARI INI
    ======================================================== */
    document.getElementById("tanggal").textContent =
      sekarang.toLocaleDateString("id-ID", {
        weekday: "long",
        day: "numeric",
        month: "long",
        year: "numeric"
      });

    /* =======================================================
       7.2B QUOTE HARIAN DARI INTERNET
    ======================================================== */
    const quoteCadangan = [
      "Selamat bekerja! Tetap semangat 💪",
      "Hari ini kesempatan baru untuk jadi lebih baik ✨",
      "Kerja ikhlas, hasil berkualitas ✅",
      "Semangat pagi! Rezeki dimulai dari disiplin 🌿",
      "Langkah kecil hari ini bisa jadi hasil besar nanti 🚀",
      "Tetap fokus, tetap kuat, tetap produktif 🔥",
      "Disiplin hari ini adalah sukses esok hari ⭐",
      "Kerja rapi, hati tenang, hasil maksimal 💼",
      "Jangan lupa bersyukur dan tetap semangat 🙏",
      "Hari ini harus lebih baik dari kemarin 💪",
      "Bekerja dengan hati membuat hari lebih berarti 🌞",
      "Mulai hari ini dengan niat baik dan semangat baru 🌱",
      "Kesuksesan dibangun dari kebiasaan kecil yang konsisten 📌",
      "Tetap tenang, tetap jalan, tetap percaya proses 💫",
      "Hasil baik datang dari kerja yang sungguh-sungguh 🧭",
      "Tidak harus sempurna, yang penting terus bergerak 🔄",
      "Kerja hari ini adalah tabungan hasil untuk besok 📈",
      "Semangat adalah bahan bakar dari kedisiplinan ⚡",
      "Mulai dengan senyum, selesaikan dengan tanggung jawab 😊",
      "Setiap hari kerja adalah peluang untuk tumbuh 🌻",
      "Fokus pada proses, hasil akan mengikuti 🎯",
      "Datang tepat waktu adalah awal dari profesionalitas ⏰",
      "Kerja kecil yang konsisten lebih kuat dari rencana besar tanpa aksi 🧱",
      "Hari yang baik dimulai dari niat yang baik 🌤️",
      "Tetap sabar, tetap disiplin, tetap maju 🚶",
      "Jaga semangat, jaga kualitas, jaga kepercayaan 🤝",
      "Satu pekerjaan selesai hari ini adalah satu langkah maju ✅",
      "Jadikan hari ini produktif dan bermakna 📌",
      "Bekerja bukan hanya hadir, tapi memberi yang terbaik 💚",
      "Tetap rendah hati dan terus belajar 📚"
    ];

    function tampilQuoteCadangan() {
      const index = sekarang.getDate() % quoteCadangan.length;

      document.getElementById("quoteHarian").textContent =
        quoteCadangan[index];
    }

    function ambilQuoteInternet() {
      const quoteElement = document.getElementById("quoteHarian");

      if (!quoteElement) {
        return;
      }

      if (!navigator.onLine) {
        tampilQuoteCadangan();
        return;
      }

      fetch("https://quotes.liupurnomo.com/api/quotes/random")
        .then(function(response) {
          return response.json();
        })
        .then(function(data) {
          let quote = "";

          if (data.quote) {
            quote = data.quote;
          } else if (data.data && data.data.quote) {
            quote = data.data.quote;
          } else if (data.text) {
            quote = data.text;
          } else if (data.content) {
            quote = data.content;
          }

          if (quote) {
            quoteElement.textContent = quote;
          } else {
            tampilQuoteCadangan();
          }
        })
        .catch(function() {
          tampilQuoteCadangan();
        });
    }

    ambilQuoteInternet();

    /* =======================================================
       7.3 FORMAT TANGGAL MENJADI yyyy-mm-dd
    ======================================================== */
    function formatKey(date){
      const y = date.getFullYear();
      const m = String(date.getMonth() + 1).padStart(2, "0");
      const d = String(date.getDate()).padStart(2, "0");
      return y + "-" + m + "-" + d;
    }

    /* =======================================================
       7.4 NORMALISASI TANGGAL DARI SPREADSHEET
    ======================================================== */
    function normalisasiTanggal(value) {
      value = String(value || "").trim();

      const matchFormatStrip = value.match(/(\d{4})-(\d{2})-(\d{2})/);
      if (matchFormatStrip) {
        return matchFormatStrip[1] + "-" + matchFormatStrip[2] + "-" + matchFormatStrip[3];
      }

      const matchFormatSlash = value.match(/(\d{1,2})\/(\d{1,2})\/(\d{4})/);
      if (matchFormatSlash) {
        const d = matchFormatSlash[1].padStart(2, "0");
        const m = matchFormatSlash[2].padStart(2, "0");
        const y = matchFormatSlash[3];
        return y + "-" + m + "-" + d;
      }

      return value;
    }

    /* =======================================================
       7.5 MODAL KONFIRMASI TANGGAL
    ======================================================== */
    function tampilModalTanggal(tanggal) {
      tanggalPending = tanggal;

      document.getElementById("modalText").innerHTML =
        "Anda memilih tanggal <b>" + tanggal + "</b>, bukan tanggal hari ini.<br><br>Lanjutkan absen untuk tanggal ini?";

      document.getElementById("modalTanggal").style.display = "flex";
    }

    function batalPilihTanggal() {
      tanggalPending = "";
      document.getElementById("modalTanggal").style.display = "none";
    }

    function lanjutPilihTanggal() {
      tanggalDipilih = tanggalPending;
      tanggalPending = "";

      document.getElementById("modalTanggal").style.display = "none";

      document.getElementById("hasil").innerHTML =
        "Tanggal dipilih";

      document.getElementById("lastUpdate").innerHTML =
        tanggalDipilih;

      buatKalender();
    }

    /* =======================================================
       7.6 AMBIL DATA DARI GOOGLE SPREADSHEET
    ======================================================== */
    function ambilDataSpreadsheet() {
      document.getElementById("hasil").innerHTML =
        "Memuat data kalender...";

      document.getElementById("lastUpdate").innerHTML =
        "Menghubungkan ke Spreadsheet...";

      const callbackName = "terimaDataAbsen_" + Date.now();

      window[callbackName] = function(data) {
        dataAbsen = {};

        data.forEach(function(item) {
          const nama = String(item.nama || "").trim().toUpperCase();
          const tanggal = normalisasiTanggal(item.tanggal);
          const status = String(item.status || "").trim().toLowerCase();

          if (nama === namaSaya.toUpperCase() && tanggal) {
            dataAbsen[tanggal] = status;
          }
        });

        buatKalender();
        cekLupaAbsenKemarin();

        const waktuUpdate = new Date().toLocaleString("id-ID", {
          day:"numeric",
          month:"long",
          year:"numeric",
          hour:"2-digit",
          minute:"2-digit"
        });

        document.getElementById("hasil").innerHTML =
          "Data kalender termuat";

        document.getElementById("lastUpdate").innerHTML =
          "Terakhir diperbarui: " + waktuUpdate;

        delete window[callbackName];

        const scriptLama = document.getElementById("jsonpDataAbsen");
        if (scriptLama) {
          scriptLama.remove();
        }
      };

      const oldScript = document.getElementById("jsonpDataAbsen");

      if (oldScript) {
        oldScript.remove();
      }

      const script = document.createElement("script");
      script.id = "jsonpDataAbsen";
      script.src =
        scriptURL +
        "?callback=" +
        callbackName +
        "&v=" +
        Date.now();

      script.onerror = function() {
        document.getElementById("hasil").innerHTML =
          "Gagal mengambil data kalender";

        document.getElementById("lastUpdate").innerHTML =
          "Periksa koneksi internet Anda.";

        buatKalender();
      };

      document.body.appendChild(script);
    }

    /* =======================================================
       7.6B NOTIFIKASI LUAR BROWSER DAN CEK LUPA ABSEN
    ======================================================== */
    function mintaIzinNotifikasi() {
      if (!("Notification" in window)) {
        return;
      }

      if (Notification.permission === "default") {
        Notification.requestPermission();
      }
    }

    function tampilNotifikasiLuarBrowser(judul, pesan) {
      if (!("Notification" in window)) {
        return;
      }

      if (Notification.permission === "granted") {
        new Notification(judul, {
          body: pesan,
          icon: "icon-192.png",
          badge: "icon-192.png"
        });
      }
    }

    function cekLupaAbsenKemarin() {
      const kemarin = new Date();
      kemarin.setDate(kemarin.getDate() - 1);

      const tanggalKemarin = formatKey(kemarin);
      const hariKemarin = kemarin.getDay();

      // Lewati hari Minggu agar tidak muncul notifikasi pada hari libur Minggu.
      if (hariKemarin === 0) {
        return;
      }

      const sudahAdaAbsen = dataAbsen[tanggalKemarin];

      if (sudahAdaAbsen) {
        return;
      }

      const keyNotifikasi = "notifikasi_lupa_absen_" + tanggalKemarin;

      if (localStorage.getItem(keyNotifikasi)) {
        return;
      }

      tampilNotifikasiLuarBrowser(
        "Anda belum absen kemarin",
        "Tanggal " + tanggalKemarin + " belum ada data absen."
      );

      localStorage.setItem(keyNotifikasi, "sudah");

      document.getElementById("hasil").innerHTML =
        "Ada tanggal yang belum absen";

      document.getElementById("lastUpdate").innerHTML =
        "Tanggal " + tanggalKemarin + " belum ada data absen.";
    }

    /* =======================================================
       7.7 KIRIM ABSEN KE GOOGLE SPREADSHEET
    ======================================================== */
    function absen(status) {
      if (!navigator.onLine) {
        document.getElementById("hasil").innerHTML =
          "Anda sedang offline.";

        document.getElementById("lastUpdate").innerHTML =
          "Absen belum bisa dikirim.";

        return;
      }

      document.getElementById("hasil").innerHTML =
        "Mengirim absen...";

      document.getElementById("lastUpdate").innerHTML =
        "Mohon tunggu sebentar.";

      fetch(scriptURL, {
        method: "POST",
        mode: "no-cors",
        headers: {
          "Content-Type": "text/plain"
        },
        body: JSON.stringify({
          nama: namaSaya,
          status: status,
          tanggal: tanggalDipilih
        })
      })
      .then(() => {
        document.getElementById("hasil").innerHTML =
          "Absen berhasil";

        document.getElementById("lastUpdate").innerHTML =
          tanggalDipilih + " - " + status;

        tampilNotifikasiLuarBrowser(
          "Absen berhasil",
          tanggalDipilih + " - " + status
        );

        setTimeout(ambilDataSpreadsheet, 1500);
      })
      .catch(() => {
        document.getElementById("hasil").innerHTML =
          "Gagal mengirim data";

        document.getElementById("lastUpdate").innerHTML =
          "Silakan coba lagi.";
      });
    }

    /* =======================================================
       7.8 BUAT DAN TAMPILKAN KALENDER
    ======================================================== */
    function buatKalender(){
      const calendar = document.getElementById("calendar");
      calendar.innerHTML = "";

      const namaBulan = new Date(tahunTampil, bulanTampil).toLocaleDateString("id-ID", {
        month: "long",
        year: "numeric"
      });

      document.getElementById("calendarTitle").textContent = namaBulan;

      const hari = ["Min", "Sen", "Sel", "Rab", "Kam", "Jum", "Sab"];

      hari.forEach(function(h, index) {
        const div = document.createElement("div");
        div.className = "day-name";

        if (index === 0) {
          div.classList.add("minggu-title");
        }

        div.textContent = h;
        calendar.appendChild(div);
      });

      const hariPertama = new Date(tahunTampil, bulanTampil, 1).getDay();
      const jumlahHari = new Date(tahunTampil, bulanTampil + 1, 0).getDate();

      for(let i = 0; i < hariPertama; i++){
        const kosong = document.createElement("div");
        calendar.appendChild(kosong);
      }

      for(let tgl = 1; tgl <= jumlahHari; tgl++){
        const date = new Date(tahunTampil, bulanTampil, tgl);
        const keyTanggal = formatKey(date);

        const day = document.createElement("div");
        day.className = "day";

        if (date.getDay() === 0) {
          day.classList.add("minggu");
        }

        if(
          tgl === sekarang.getDate() &&
          bulanTampil === sekarang.getMonth() &&
          tahunTampil === sekarang.getFullYear()
        ){
          day.classList.add("today");
        }

        if(keyTanggal === tanggalDipilih){
          day.classList.add("selected");
        }

        day.innerHTML = "<div>" + tgl + "</div>";

        day.addEventListener("click", function() {
          const tanggalHariIni = formatKey(sekarang);

          if (keyTanggal !== tanggalHariIni) {
            tampilModalTanggal(keyTanggal);
            return;
          }

          tanggalDipilih = keyTanggal;

          document.getElementById("hasil").innerHTML =
            "Tanggal dipilih";

          document.getElementById("lastUpdate").innerHTML =
            tanggalDipilih;

          buatKalender();
        });

        const status = String(dataAbsen[keyTanggal] || "").trim().toLowerCase();

        if(status){
          const dot = document.createElement("div");
          dot.className = "dot";

          if(status.includes("setengah")){
            dot.style.background = "orange";
          } else if(status.includes("tidak")){
            dot.style.background = "red";
          } else if(status.includes("masuk")){
            dot.style.background = "green";
          } else {
            dot.style.background = "blue";
          }

          day.appendChild(dot);
        }

        calendar.appendChild(day);
      }
    }

    /* =======================================================
       7.9 TOMBOL PINDAH BULAN
    ======================================================== */
    document.getElementById("prevMonthBtn").addEventListener("click", function() {
      bulanTampil--;

      if (bulanTampil < 0) {
        bulanTampil = 11;
        tahunTampil--;
      }

      buatKalender();
    });

    document.getElementById("nextMonthBtn").addEventListener("click", function() {
      bulanTampil++;

      if (bulanTampil > 11) {
        bulanTampil = 0;
        tahunTampil++;
      }

      buatKalender();
    });

    /* =======================================================
       7.10 SERVICE WORKER PWA
    ======================================================== */
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("sw.js");
    }

    /* =======================================================
       7.11 TOMBOL INSTALL APLIKASI
    ======================================================== */
    let deferredPrompt;
    const installBtn = document.getElementById("installBtn");

    window.addEventListener("beforeinstallprompt", function(e) {
      e.preventDefault();
      deferredPrompt = e;
      installBtn.style.display = "inline-block";
    });

    installBtn.addEventListener("click", async function() {
      installBtn.style.display = "none";

      if (deferredPrompt) {
        deferredPrompt.prompt();
        await deferredPrompt.userChoice;
        deferredPrompt = null;
      }
    });

    /* =======================================================
       7.12 BAR STATUS ONLINE / OFFLINE
    ======================================================== */
    function updateStatusOnline() {
      const offlineBar = document.getElementById("offlineBar");

      if (!navigator.onLine) {
        offlineBar.style.display = "block";
        document.body.classList.add("offline-padding");
      } else {
        offlineBar.style.display = "none";
        document.body.classList.remove("offline-padding");
      }
    }

    window.addEventListener("online", updateStatusOnline);
    window.addEventListener("offline", updateStatusOnline);

    updateStatusOnline();

    /* =======================================================
       7.13 JALANKAN APLIKASI
    ======================================================== */
    mintaIzinNotifikasi();
    ambilDataSpreadsheet();

  </script>
