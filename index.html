<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Absen Pribadi</title>

  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#008000">

  <style>
    body{
      font-family: Arial, sans-serif;
      text-align:center;
      margin:0;
      padding:20px;
      background:#ffffff;
    }

    h1{
      margin-top:20px;
      margin-bottom:15px;
    }

    #tanggal{
      display:inline-block;
      background:#f1f1f1;
      padding:12px 22px;
      border-radius:10px;
      font-size:22px;
      color:#333;
      font-weight:bold;
      margin-bottom:15px;
    }

    .button-area{
      display:flex;
      justify-content:center;
      gap:18px;
      flex-wrap:wrap;
      margin-bottom:15px;
    }

    button{
      width:220px;
      height:60px;
      font-size:20px;
      border:none;
      border-radius:10px;
      cursor:pointer;
      color:white;
    }

    .masuk{ background:green; }
    .setengah{ background:orange; }
    .tidak{ background:red; }

    #hasil{
      margin-top:10px;
      color:#333;
      min-height:30px;
      font-weight:bold;
    }

    .calendar-box{
      max-width:900px;
      margin:20px auto;
      border:2px solid #ddd;
      border-radius:15px;
      padding:20px;
    }

    .calendar-title{
      font-size:24px;
      font-weight:bold;
      margin-bottom:15px;
    }

    .calendar{
      display:grid;
      grid-template-columns:repeat(7, 1fr);
      gap:8px;
    }

    .day-name{
      font-weight:bold;
      padding:10px 0;
      background:#f3f3f3;
      border-radius:8px;
    }

    .day{
      min-height:65px;
      border:1px solid #ddd;
      border-radius:10px;
      display:flex;
      flex-direction:column;
      justify-content:center;
      align-items:center;
      font-size:18px;
      background:#fff;
      cursor:pointer;
    }

    .day:hover{
      background:#f5fff5;
    }

    .today{
      border:3px solid #008000;
      font-weight:bold;
    }

    .selected{
      background:#dbeafe !important;
      border:3px solid #2563eb !important;
      font-weight:bold;
    }

    .dot{
      width:13px;
      height:13px;
      border-radius:50%;
      margin-top:8px;
    }

    .dot-masuk{ background:green; }
    .dot-setengah{ background:orange; }
    .dot-tidak{ background:red; }

    .legend{
      margin-top:18px;
      display:flex;
      justify-content:center;
      gap:20px;
      flex-wrap:wrap;
      font-size:15px;
    }

    .legend span{
      display:inline-flex;
      align-items:center;
      gap:6px;
    }

    .mini-dot{
      width:12px;
      height:12px;
      border-radius:50%;
      display:inline-block;
    }

    #installBtn{
      display:none;
      background:#333;
      margin-top:20px;
    }

    @media(max-width:600px){
      body{
        padding:15px;
      }

      h1{
        font-size:28px;
      }

      #tanggal{
        font-size:18px;
      }

      .button-area{
        flex-direction:column;
        align-items:center;
        gap:10px;
      }

      button{
        width:100%;
        max-width:330px;
        height:55px;
        font-size:18px;
      }

      .calendar-box{
        padding:10px;
      }

      .calendar{
        gap:5px;
      }

      .day{
        min-height:48px;
        font-size:14px;
      }

      .day-name{
        font-size:13px;
        padding:7px 0;
      }
    }
  </style>
</head>

<body>

  <h1>Absen Kerja</h1>

  <div id="tanggal"></div>

  <div class="button-area">
    <button class="masuk" onclick="absen('Masuk')">MASUK</button>
    <button class="setengah" onclick="absen('Setengah Hari')">SETENGAH HARI</button>
    <button class="tidak" onclick="absen('Tidak Masuk')">TIDAK MASUK</button>
  </div>

  <h3 id="hasil">Pilih tanggal di kalender terlebih dahulu</h3>

  <div class="calendar-box">
    <div class="calendar-title" id="calendarTitle"></div>
    <div class="calendar" id="calendar"></div>

    <div class="legend">
      <span><i class="mini-dot" style="background:green"></i> Masuk</span>
      <span><i class="mini-dot" style="background:orange"></i> Setengah Hari</span>
      <span><i class="mini-dot" style="background:red"></i> Tidak Masuk</span>
    </div>
  </div>

  <button id="installBtn">Install Aplikasi</button>

  <script>
    const scriptURL = "https://script.google.com/macros/s/AKfycbwgA5-L3qyLPOl5L_vikrd8AfMDj95UZcFMhdJLWHxxGWdcfMp0qXQtLPYszWdw5XvX/exec";
    const namaSaya = "MANGADI";

    const sekarang = new Date();
    const tahun = sekarang.getFullYear();
    const bulan = sekarang.getMonth();

    let dataAbsen = {};
    let tanggalDipilih = "";

    document.getElementById("tanggal").textContent =
      sekarang.toLocaleDateString("id-ID", {
        weekday: "long",
        day: "numeric",
        month: "long",
        year: "numeric"
      });

    function formatKey(date){
      const y = date.getFullYear();
      const m = String(date.getMonth() + 1).padStart(2, "0");
      const d = String(date.getDate()).padStart(2, "0");
      return y + "-" + m + "-" + d;
    }

    function ambilDataSpreadsheet() {

  const callbackName = "terimaDataAbsen";

  window[callbackName] = function(data) {

    dataAbsen = {};

    data.forEach(function(item) {

      const nama = String(item.nama).trim();
      const tanggal = String(item.tanggal).trim();
      const status = String(item.status).trim();

      if (nama === namaSaya) {
        dataAbsen[tanggal] = status;
      }

    });

    console.log("Data dari spreadsheet:", dataAbsen);

    buatKalender();

    document.getElementById("hasil").innerHTML =
      "Data kalender berhasil dimuat";

  };

  const oldScript = document.getElementById("jsonpDataAbsen");

  if (oldScript) {
    oldScript.remove();
  }

  const script = document.createElement("script");
  script.id = "jsonpDataAbsen";
  script.src =
    scriptURL +
    "?callback=" +
    callbackName +
    "&v=" +
    new Date().getTime();

  script.onerror = function() {
    document.getElementById("hasil").innerHTML =
      "Gagal mengambil data kalender";
  };

  document.body.appendChild(script);

}

    function ambilStatusTanggal(date){
      const key = formatKey(date);
      return dataAbsen[key];
    }

    function absen(status) {
      if (!tanggalDipilih) {
        alert("Pilih tanggal di kalender terlebih dahulu");
        return;
      }

      document.getElementById("hasil").innerHTML = "Mengirim absen...";

      fetch(scriptURL, {
        method: "POST",
        mode: "no-cors",
        headers: {
          "Content-Type": "text/plain"
        },
        body: JSON.stringify({
          nama: namaSaya,
          status: status,
          tanggal: tanggalDipilih
        })
      })
      .then(() => {
        document.getElementById("hasil").innerHTML =
          "Absen berhasil : " + tanggalDipilih + " - " + status;

        setTimeout(ambilDataSpreadsheet, 1500);
      })
      .catch(() => {
        document.getElementById("hasil").innerHTML =
          "Gagal mengirim data";
      });
    }

    function buatKalender(){
  const calendar = document.getElementById("calendar");
  calendar.innerHTML = "";

  const namaBulan = new Date(tahun, bulan).toLocaleDateString("id-ID", {
    month: "long",
    year: "numeric"
  });

  document.getElementById("calendarTitle").textContent = namaBulan;

  const hari = ["Min", "Sen", "Sel", "Rab", "Kam", "Jum", "Sab"];

  hari.forEach(h => {
    const div = document.createElement("div");
    div.className = "day-name";
    div.textContent = h;
    calendar.appendChild(div);
  });

  const hariPertama = new Date(tahun, bulan, 1).getDay();
  const jumlahHari = new Date(tahun, bulan + 1, 0).getDate();

  for(let i = 0; i < hariPertama; i++){
    const kosong = document.createElement("div");
    calendar.appendChild(kosong);
  }

  for(let tgl = 1; tgl <= jumlahHari; tgl++){
    const date = new Date(tahun, bulan, tgl);
    const keyTanggal = formatKey(date);

    const day = document.createElement("div");
    day.className = "day";

    if(
      tgl === sekarang.getDate() &&
      bulan === sekarang.getMonth() &&
      tahun === sekarang.getFullYear()
    ){
      day.classList.add("today");
    }

    if(keyTanggal === tanggalDipilih){
      day.classList.add("selected");
    }

    day.innerHTML = "<div>" + tgl + "</div>";

    day.addEventListener("click", function() {
      tanggalDipilih = keyTanggal;

      document.getElementById("hasil").innerHTML =
        "Tanggal dipilih : " + tanggalDipilih;

      buatKalender();
    });

    const status = ambilStatusTanggal(date);

    if(status){
      const dot = document.createElement("div");
      dot.className = "dot";

      if(status === "Masuk"){
        dot.classList.add("dot-masuk");
      } else if(status === "Setengah Hari"){
        dot.classList.add("dot-setengah");
      } else if(status === "Tidak Masuk"){
        dot.classList.add("dot-tidak");
      }

      day.appendChild(dot);
    }

    calendar.appendChild(day);
  }
}

    ambilDataSpreadsheet();

    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("sw.js");
    }

    let deferredPrompt;
    const installBtn = document.getElementById("installBtn");

    window.addEventListener("beforeinstallprompt", function(e) {
      e.preventDefault();
      deferredPrompt = e;
      installBtn.style.display = "inline-block";
    });

    installBtn.addEventListener("click", async function() {
      installBtn.style.display = "none";

      if (deferredPrompt) {
        deferredPrompt.prompt();
        await deferredPrompt.userChoice;
        deferredPrompt = null;
      }
    });
  </script>

</body>
</html>
