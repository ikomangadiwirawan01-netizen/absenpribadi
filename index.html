<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Absen Pribadi</title>

  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#008000">

  <style>
    body{
      font-family: Arial, sans-serif;
      text-align:center;
      margin:0;
      padding:20px;
      background:#ffffff;
    }

    h1{
      margin-top:20px;
      margin-bottom:15px;
    }

    #tanggal{
      display:inline-block;
      background:#f1f1f1;
      padding:12px 22px;
      border-radius:10px;
      font-size:22px;
      color:#333;
      font-weight:bold;
      margin-bottom:15px;
    }

    .button-area{
      display:flex;
      justify-content:center;
      gap:18px;
      flex-wrap:wrap;
      margin-bottom:15px;
    }

    button{
      width:220px;
      height:60px;
      font-size:20px;
      border:none;
      border-radius:10px;
      cursor:pointer;
      color:white;
    }

    .masuk{ background:green; }
    .setengah{ background:orange; }
    .tidak{ background:red; }

    #hasil{
      margin-top:10px;
      color:#333;
      min-height:30px;
      font-weight:bold;
    }

    .calendar-box{
      max-width:900px;
      margin:20px auto;
      border:2px solid #ddd;
      border-radius:15px;
      padding:20px;
    }

    .calendar-title{
      font-size:24px;
      font-weight:bold;
      margin-bottom:15px;
    }

    .calendar{
      display:grid;
      grid-template-columns:repeat(7, 1fr);
      gap:8px;
    }

    .day-name{
      font-weight:bold;
      padding:10px 0;
      background:#f3f3f3;
      border-radius:8px;
    }

    .day-name.minggu-title{
      background:#fee2e2;
      color:#dc2626;
    }

    .day{
      min-height:65px;
      border:1px solid #ddd;
      border-radius:10px;
      display:flex;
      flex-direction:column;
      justify-content:center;
      align-items:center;
      font-size:18px;
      background:#fff;
      cursor:pointer;
    }

    .day:hover{
      background:#f5fff5;
    }

    .today{
      border:3px solid #008000;
      font-weight:bold;
    }

    .selected{
      background:#dbeafe !important;
      border:3px solid #2563eb !important;
      font-weight:bold;
    }

    .minggu{
      background:#fee2e2 !important;
      color:#dc2626;
      border:1px solid #fca5a5;
      font-weight:bold;
    }

    .minggu.selected{
      background:#dbeafe !important;
      color:#111827;
      border:3px solid #2563eb !important;
    }

    .minggu.today{
      border:3px solid #dc2626;
    }

    .dot{
      width:13px;
      height:13px;
      border-radius:50%;
      margin-top:8px;
    }

    .legend{
      margin-top:18px;
      display:flex;
      justify-content:center;
      gap:20px;
      flex-wrap:wrap;
      font-size:15px;
    }

    .legend span{
      display:inline-flex;
      align-items:center;
      gap:6px;
    }

    .mini-dot{
      width:12px;
      height:12px;
      border-radius:50%;
      display:inline-block;
    }

    #installBtn{
      display:none;
      background:#333;
      margin-top:20px;
    }

    .modal-overlay{
      display:none;
      position:fixed;
      inset:0;
      background:rgba(0,0,0,0.45);
      z-index:9999;
      justify-content:center;
      align-items:center;
      padding:20px;
    }

    .modal-box{
      background:white;
      width:100%;
      max-width:380px;
      border-radius:18px;
      padding:25px;
      text-align:center;
      box-shadow:0 15px 40px rgba(0,0,0,0.25);
      animation:modalMasuk 0.2s ease;
    }

    .modal-icon{
      width:55px;
      height:55px;
      background:#fff3cd;
      color:#b45309;
      border-radius:50%;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:30px;
      margin:0 auto 15px auto;
      font-weight:bold;
    }

    .modal-box h2{
      margin:0 0 10px 0;
      font-size:22px;
    }

    .modal-box p{
      margin:0 0 20px 0;
      color:#555;
      line-height:1.5;
    }

    .modal-actions{
      display:flex;
      gap:10px;
      justify-content:center;
    }

    .modal-actions button{
      width:140px;
      height:45px;
      font-size:16px;
      border-radius:10px;
    }

    .btn-batal{
      background:#6b7280;
    }

    .btn-lanjut{
      background:#2563eb;
    }

    @keyframes modalMasuk{
      from{
        transform:scale(0.9);
        opacity:0;
      }
      to{
        transform:scale(1);
        opacity:1;
      }
    }

    @media(max-width:600px){
      body{
        padding:15px;
      }

      h1{
        font-size:28px;
      }

      #tanggal{
        font-size:18px;
      }

      .button-area{
        flex-direction:column;
        align-items:center;
        gap:10px;
      }

      button{
        width:100%;
        max-width:330px;
        height:55px;
        font-size:18px;
      }

      .calendar-box{
        padding:10px;
      }

      .calendar{
        gap:5px;
      }

      .day{
        min-height:48px;
        font-size:14px;
      }

      .day-name{
        font-size:13px;
        padding:7px 0;
      }

      .modal-actions{
        flex-direction:column;
      }

      .modal-actions button{
        width:100%;
      }
    }
  </style>
</head>

<body>

  <h1>Absen Kerja</h1>

  <div id="tanggal"></div>

  <div class="button-area">
    <button class="masuk" onclick="absen('Masuk')">MASUK</button>
    <button class="setengah" onclick="absen('Setengah Hari')">SETENGAH HARI</button>
    <button class="tidak" onclick="absen('Tidak Masuk')">TIDAK MASUK</button>
  </div>

  <h3 id="hasil">Pilih tanggal di kalender terlebih dahulu</h3>

  <div class="calendar-box">
    <div class="calendar-title" id="calendarTitle"></div>
    <div class="calendar" id="calendar"></div>

    <div class="legend">
      <span><i class="mini-dot" style="background:green"></i> Masuk</span>
      <span><i class="mini-dot" style="background:orange"></i> Setengah Hari</span>
      <span><i class="mini-dot" style="background:red"></i> Tidak Masuk</span>
      <span><i class="mini-dot" style="background:#fee2e2; border:1px solid #dc2626"></i> Hari Minggu</span>
    </div>
  </div>

  <button id="installBtn">Install Aplikasi</button>

  <div class="modal-overlay" id="modalTanggal">
    <div class="modal-box">
      <div class="modal-icon">!</div>
      <h2>Konfirmasi Tanggal</h2>
      <p id="modalText">
        Anda memilih tanggal selain hari ini.
      </p>

      <div class="modal-actions">
        <button class="btn-batal" onclick="batalPilihTanggal()">Batal</button>
        <button class="btn-lanjut" onclick="lanjutPilihTanggal()">Lanjutkan</button>
      </div>
    </div>
  </div>

  <script>
    const scriptURL = "https://script.google.com/macros/s/AKfycbwgA5-L3qyLPOl5L_vikrd8AfMDj95UZcFMhdJLWHxxGWdcfMp0qXQtLPYszWdw5XvX/exec";
    const namaSaya = "MANGADI";

    const sekarang = new Date();
    const tahun = sekarang.getFullYear();
    const bulan = sekarang.getMonth();

    let dataAbsen = {};
    let tanggalDipilih = "";
    let tanggalPending = "";

    document.getElementById("tanggal").textContent =
      sekarang.toLocaleDateString("id-ID", {
        weekday: "long",
        day: "numeric",
        month: "long",
        year: "numeric"
      });

    function formatKey(date){
      const y = date.getFullYear();
      const m = String(date.getMonth() + 1).padStart(2, "0");
      const d = String(date.getDate()).padStart(2, "0");
      return y + "-" + m + "-" + d;
    }

    function normalisasiTanggal(value) {
      value = String(value || "").trim();

      const matchFormatStrip = value.match(/(\d{4})-(\d{2})-(\d{2})/);
      if (matchFormatStrip) {
        return matchFormatStrip[1] + "-" + matchFormatStrip[2] + "-" + matchFormatStrip[3];
      }

      const matchFormatSlash = value.match(/(\d{1,2})\/(\d{1,2})\/(\d{4})/);
      if (matchFormatSlash) {
        const d = matchFormatSlash[1].padStart(2, "0");
        const m = matchFormatSlash[2].padStart(2, "0");
        const y = matchFormatSlash[3];
        return y + "-" + m + "-" + d;
      }

      return value;
    }

    function tampilModalTanggal(tanggal) {
      tanggalPending = tanggal;

      document.getElementById("modalText").innerHTML =
        "Anda memilih tanggal <b>" + tanggal + "</b>, bukan tanggal hari ini.<br><br>Lanjutkan absen untuk tanggal ini?";

      document.getElementById("modalTanggal").style.display = "flex";
    }

    function batalPilihTanggal() {
      tanggalPending = "";
      document.getElementById("modalTanggal").style.display = "none";
    }

    function lanjutPilihTanggal() {
      tanggalDipilih = tanggalPending;
      tanggalPending = "";

      document.getElementById("modalTanggal").style.display = "none";

      document.getElementById("hasil").innerHTML =
        "Tanggal dipilih : " + tanggalDipilih;

      buatKalender();
    }

    function ambilDataSpreadsheet() {
      const callbackName = "terimaDataAbsen_" + Date.now();

      window[callbackName] = function(data) {
        dataAbsen = {};

        let jumlahDataCocok = 0;

        data.forEach(function(item) {
          const nama = String(item.nama || "").trim().toUpperCase();
          const tanggal = normalisasiTanggal(item.tanggal);
          const status = String(item.status || "").trim().toLowerCase();

          if (nama === namaSaya.toUpperCase() && tanggal) {
            dataAbsen[tanggal] = status;
            jumlahDataCocok++;
          }
        });

        buatKalender();

        document.getElementById("hasil").innerHTML =
          "Data kalender dimuat : " + jumlahDataCocok + " data";

        delete window[callbackName];

        const scriptLama = document.getElementById("jsonpDataAbsen");
        if (scriptLama) {
          scriptLama.remove();
        }
      };

      const oldScript = document.getElementById("jsonpDataAbsen");

      if (oldScript) {
        oldScript.remove();
      }

      const script = document.createElement("script");
      script.id = "jsonpDataAbsen";
      script.src =
        scriptURL +
        "?callback=" +
        callbackName +
        "&v=" +
        Date.now();

      script.onerror = function() {
        document.getElementById("hasil").innerHTML =
          "Gagal mengambil data kalender";
        buatKalender();
      };

      document.body.appendChild(script);
    }

    function absen(status) {
      if (!tanggalDipilih) {
        alert("Pilih tanggal di kalender terlebih dahulu");
        return;
      }

      document.getElementById("hasil").innerHTML = "Mengirim absen...";

      fetch(scriptURL, {
        method: "POST",
        mode: "no-cors",
        headers: {
          "Content-Type": "text/plain"
        },
        body: JSON.stringify({
          nama: namaSaya,
          status: status,
          tanggal: tanggalDipilih
        })
      })
      .then(() => {
        document.getElementById("hasil").innerHTML =
          "Absen berhasil : " + tanggalDipilih + " - " + status;

        setTimeout(ambilDataSpreadsheet, 1500);
      })
      .catch(() => {
        document.getElementById("hasil").innerHTML =
          "Gagal mengirim data";
      });
    }

    function buatKalender(){
      const calendar = document.getElementById("calendar");
      calendar.innerHTML = "";

      const namaBulan = new Date(tahun, bulan).toLocaleDateString("id-ID", {
        month: "long",
        year: "numeric"
      });

      document.getElementById("calendarTitle").textContent = namaBulan;

      const hari = ["Min", "Sen", "Sel", "Rab", "Kam", "Jum", "Sab"];

      hari.forEach(function(h, index) {
        const div = document.createElement("div");
        div.className = "day-name";

        if (index === 0) {
          div.classList.add("minggu-title");
        }

        div.textContent = h;
        calendar.appendChild(div);
      });

      const hariPertama = new Date(tahun, bulan, 1).getDay();
      const jumlahHari = new Date(tahun, bulan + 1, 0).getDate();

      for(let i = 0; i < hariPertama; i++){
        const kosong = document.createElement("div");
        calendar.appendChild(kosong);
      }

      for(let tgl = 1; tgl <= jumlahHari; tgl++){
        const date = new Date(tahun, bulan, tgl);
        const keyTanggal = formatKey(date);

        const day = document.createElement("div");
        day.className = "day";

        if (date.getDay() === 0) {
          day.classList.add("minggu");
        }

        if(
          tgl === sekarang.getDate() &&
          bulan === sekarang.getMonth() &&
          tahun === sekarang.getFullYear()
        ){
          day.classList.add("today");
        }

        if(keyTanggal === tanggalDipilih){
          day.classList.add("selected");
        }

        day.innerHTML = "<div>" + tgl + "</div>";

        day.addEventListener("click", function() {
          const tanggalHariIni = formatKey(sekarang);

          if (keyTanggal !== tanggalHariIni) {
            tampilModalTanggal(keyTanggal);
            return;
          }

          tanggalDipilih = keyTanggal;

          document.getElementById("hasil").innerHTML =
            "Tanggal dipilih : " + tanggalDipilih;

          buatKalender();
        });

        const status = String(dataAbsen[keyTanggal] || "").trim().toLowerCase();

        if(status){
          const dot = document.createElement("div");
          dot.className = "dot";

          if(status.includes("setengah")){
            dot.style.background = "orange";
          } else if(status.includes("tidak")){
            dot.style.background = "red";
          } else if(status.includes("masuk")){
            dot.style.background = "green";
          } else {
            dot.style.background = "blue";
          }

          day.appendChild(dot);
        }

        calendar.appendChild(day);
      }
    }

    ambilDataSpreadsheet();

    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("sw.js");
    }

    let deferredPrompt;
    const installBtn = document.getElementById("installBtn");

    window.addEventListener("beforeinstallprompt", function(e) {
      e.preventDefault();
      deferredPrompt = e;
      installBtn.style.display = "inline-block";
    });

    installBtn.addEventListener("click", async function() {
      installBtn.style.display = "none";

      if (deferredPrompt) {
        deferredPrompt.prompt();
        await deferredPrompt.userChoice;
        deferredPrompt = null;
      }
    });
  </script>

</body>
</html>
